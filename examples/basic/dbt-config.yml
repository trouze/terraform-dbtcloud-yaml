# yaml-language-server: $schema=https://raw.githubusercontent.com/dbt-labs/terraform-dbtcloud-as-yaml/refs/heads/main/schemas/v1.json

##############################################################################
# dbt Cloud Terraform YAML — Minimal Starter (version: 1)
#
# Fill in the placeholder values (search for YOUR_) and run:
#   terraform init && terraform apply
##############################################################################

version: 1
account:
  name: YOUR_ACCOUNT_NAME
  host_url: https://cloud.getdbt.com

globals:
  connections:
    - name: YOUR_CONNECTION_NAME
      key: prod_connection
      type: databricks
      protected: true
      details:
        host: YOUR_HOST
        http_path: YOUR_HTTP_PATH
        catalog: YOUR_CATALOG

projects:
  - name: YOUR_PROJECT_NAME
    key: analytics
    repository:
      remote_url: "YOUR_ORG/YOUR_REPO"
      github_installation_id: YOUR_GITHUB_APP_ID

    environments:
      - name: Production
        key: prod
        type: deployment
        deployment_type: production
        connection: prod_connection
        custom_branch: main
        protected: true
        credential:
          credential_type: databricks
          catalog: YOUR_CATALOG
          schema: YOUR_SCHEMA

      - name: Development
        key: dev
        type: development
        connection: prod_connection
        credential:
          credential_type: databricks
          catalog: YOUR_CATALOG
          schema: YOUR_SCHEMA_DEV

    jobs:
      - name: Daily Build
        key: daily_build
        environment_key: prod
        execute_steps:
          - dbt build
        triggers:
          schedule: true
          github_webhook: false
          git_provider_webhook: false
          on_merge: false
        schedule_type: days_of_week
        schedule_days: [1, 2, 3, 4, 5]
        schedule_hours: [6]
