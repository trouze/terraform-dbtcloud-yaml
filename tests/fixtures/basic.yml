project:
  name: My Test Project
  key: my_project
  environments:
    - name: Production
      key: prod
      type: deployment
      deployment_type: production
      protected: true
  jobs:
    - name: Daily Run
      key: daily_run
      environment_key: prod
      execute_steps:
        - dbt build
      triggers:
        schedule: true
        github_webhook: false
        git_provider_webhook: false
        on_merge: false
      schedule_type: days_of_week
      schedule_days: [0, 1, 2, 3, 4]
      schedule_hours: [6]
